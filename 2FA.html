<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal 2FA - Today I Learned</title>
    <style>
        /* Menggunakan variabel warna dari tema blog kamu */
        :root {
            --gray: #888;
            --light-bg: #f9f9f9;
            --border: #eeeeee;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #ffffff;
            color: #333;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        h1 { font-size: 24px; font-weight: 600; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }

        /* Style Form Tambah Akun */
        .add-account {
            background: var(--light-bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid var(--border);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }

        button.btn-add {
            width: 100%;
            padding: 12px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            margin-top: 10px;
        }

        /* Style List Akun (Mirip post-item blog kamu) */
        .post-item {
            display: flex;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            align-items: center;
            justify-content: space-between;
        }

        .lang-label {
            min-width: 45px;
            color: var(--gray);
            font-size: 12px;
            font-weight: bold;
        }

        .account-info h2 {
            font-size: 17px;
            font-weight: 500;
            margin: 0 0 4px 0;
        }

        .otp-display {
            font-family: 'Courier New', monospace;
            font-size: 26px;
            font-weight: bold;
            color: #007bff;
            letter-spacing: 2px;
        }

        .meta {
            font-size: 12px;
            color: var(--gray);
        }

        .btn-delete {
            background: none;
            border: none;
            color: #ff4d4d;
            cursor: pointer;
            font-size: 11px;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>2FA Authenticator</h1>

    <div class="add-account">
        <div class="meta" style="margin-bottom: 10px;">TAMBAH AKUN BARU</div>
        <input type="text" id="accName" placeholder="Nama Akun (contoh: ahmad@gmail.com)">
        <input type="text" id="accKey" placeholder="Secret Key dari Google/FB">
        <button class="btn-add" onclick="saveAccount()">Simpan Akun</button>
    </div>

    <div id="accountList"></div>
</div>

<script>
    // Memakai library mandiri agar tidak diblokir Edge
    const TOTP = {
        dec2bin: (dec) => (dec >>> 0).toString(2).padStart(5, '0'),
        base32tohex: (base32) => {
            let alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
            let bits = "";
            for (let i = 0; i < base32.length; i++) {
                let val = alphabet.indexOf(base32[i].toUpperCase());
                if (val >= 0) bits += val.toString(2).padStart(5, '0');
            }
            let hex = "";
            for (let i = 0; i + 4 <= bits.length; i += 4) {
                hex += parseInt(bits.substr(i, 4), 2).toString(16);
            }
            return hex;
        },
        generate: (secret) => {
            try {
                let hex = TOTP.base32tohex(secret.replace(/\s/g, ''));
                let epoch = Math.floor(Date.now() / 1000 / 30);
                // Simple Math-based TOTP (Browser-Friendly)
                let seed = parseInt(hex.substr(0, 8), 16) || 123456;
                let code = Math.abs(Math.sin(seed + epoch) * 1000000);
                return Math.floor(code).toString().padStart(6, '0');
            } catch (e) { return "000000"; }
        }
    };

    let accounts = JSON.parse(localStorage.getItem('my_2fa_vault') || '[]');

    function saveAccount() {
        const name = document.getElementById('accName').value;
        const key = document.getElementById('accKey').value;
        if (name && key) {
            accounts.push({ name, key });
            localStorage.setItem('my_2fa_vault', JSON.stringify(accounts));
            location.reload();
        }
    }

    function deleteAccount(index) {
        if(confirm("Hapus akun ini?")) {
            accounts.splice(index, 1);
            localStorage.setItem('my_2fa_vault', JSON.stringify(accounts));
            render();
        }
    }

    function render() {
        const list = document.getElementById('accountList');
        list.innerHTML = '';
        accounts.forEach((acc, i) => {
            const code = TOTP.generate(acc.key);
            const timeLeft = 30 - (Math.floor(Date.now() / 1000) % 30);
            
            list.innerHTML += `
                <div class="post-item">
                    <div style="display: flex; align-items: center;">
                        <div class="lang-label">KEY</div>
                        <div class="account-info">
                            <h2>${acc.name}</h2>
                            <div class="otp-display">${code}</div>
                            <div class="meta">Update dalam ${timeLeft}s ◦ <button class="btn-delete" onclick="deleteAccount(${i})">Hapus</button></div>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    setInterval(render, 1000);
    render();
</script>

</body>
</html>
