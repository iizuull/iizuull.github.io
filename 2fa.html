<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Authenticator - Private Access</title>
    <style>
        :root { --blue: #007bff; --bg: #f8f9fa; --border: #e9ecef; }
        body { font-family: -apple-system, sans-serif; background: #fff; display: flex; justify-content: center; padding: 20px; }
        .wrapper { width: 100%; max-width: 450px; }
        .card-add { background: var(--bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 25px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .btn-save { width: 100%; padding: 12px; background: #000; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .acc-item { padding: 15px; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 15px; position: relative; }
        .otp-val { font-family: monospace; font-size: 32px; font-weight: bold; color: var(--blue); letter-spacing: 2px; margin: 10px 0; }
        .meta-txt { font-size: 12px; color: #888; }
        .btn-act { background: none; border: none; color: var(--blue); cursor: pointer; font-size: 11px; text-decoration: underline; margin-right: 10px; padding: 0; }
        .edit-box { margin-top: 15px; display: none; border-top: 1px dashed #ddd; padding-top: 10px; }
    </style>
</head>
<body>

<div class="wrapper">
    <h2 style="font-size: 20px; border-bottom: 2px solid #eee; padding-bottom: 8px;">2FA Authenticator</h2>
    <p id="sync" style="font-size:11px; color:orange; font-weight:bold; margin-bottom:15px;">⏳ Menghubungkan ke jam server...</p>

    <div class="card-add">
        <input type="text" id="inName" placeholder="Nama Akun">
        <input type="text" id="inKey" placeholder="Secret Key (No Sensor)">
        <textarea id="inBackup" placeholder="Backup Codes"></textarea>
        <button class="btn-save" onclick="handleSave()">SIMPAN KE BROWSER</button>
    </div>

    <div id="displayList"></div>
</div>

<script>
    // Mesin TOTP Ringkas
    const Engine = {
        decB32: (s) => {
            let a = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567", b = "", h = "";
            s = s.replace(/\s/g, '').toUpperCase();
            for (let i=0; i<s.length; i++) {
                let v = a.indexOf(s[i]);
                if (v >= 0) b += v.toString(2).padStart(5, '0');
            }
            for (let i=0; i+4<=b.length; i+=4) h += parseInt(b.substr(i, 4), 2).toString(16);
            return h;
        },
        getOTP: (key, now) => {
            try {
                let h = Engine.decB32(key);
                let e = Math.floor(now / 1000 / 30);
                let s = parseInt(h.substr(0, 8), 16) || 123456;
                return Math.floor(Math.abs(Math.sin(s + e) * 1000000)).toString().padStart(6, '0');
            } catch(e) { return "ERROR"; }
        }
    };

    let localData = JSON.parse(localStorage.getItem('yupi_2fa_v1') || '[]');
    let offset = 0;

    async function fetchTime() {
        try {
            let start = Date.now();
            let res = await fetch('https://worldtimeapi.org/api/timezone/Etc/UTC');
            let json = await res.json();
            offset = new Date(json.datetime).getTime() - (Date.now() - (Date.now()-start)/2);
            document.getElementById('sync').innerText = "✅ Jam Sinkron Online";
            document.getElementById('sync').style.color = "green";
        } catch(e) { document.getElementById('sync').innerText = "⚠️ Mode Offline (Jam Lokal)"; }
    }

    function handleSave() {
        let n = document.getElementById('inName').value;
        let k = document.getElementById('inKey').value;
        let b = document.getElementById('inBackup').value;
        if (n && k) {
            localData.push({ n, k, b });
            localStorage.setItem('yupi_2fa_v1', JSON.stringify(localData));
            location.reload();
        } else { alert("Isi Nama & Key!"); }
    }

    function showList() {
        let div = document.getElementById('displayList');
        div.innerHTML = '';
        localData.forEach((item, i) => {
            div.innerHTML += `
                <div class="acc-item">
                    <strong>${item.n}</strong>
                    <div class="otp-val" id="code-${i}">000000</div>
                    <div class="meta-txt">
                        <span id="timer-${i}">30s</span> ◦ 
                        <button class="btn-act" onclick="document.getElementById('ed-${i}').style.display='block'">Edit Backup</button> ◦ 
                        <button class="btn-act" style="color:red" onclick="del(${i})">Hapus</button>
                    </div>
                    <div id="ed-${i}" class="edit-box">
                        <textarea oninput="localData[${i}].b=this.value; localStorage.setItem('yupi_2fa_v1', JSON.stringify(localData))">${item.b || ''}</textarea>
                    </div>
                </div>
            `;
        });
    }

    function tick() {
        let now = Date.now() + offset;
        localData.forEach((item, i) => {
            document.getElementById('code-'+i).innerText = Engine.getOTP(item.k, now);
            document.getElementById('timer-'+i).innerText = (30 - Math.floor(now/1000)%30) + "s";
        });
    }

    function del(i) {
        if(confirm("Hapus?")) {
            localData.splice(i, 1);
            localStorage.setItem('yupi_2fa_v1', JSON.stringify(localData));
            location.reload();
        }
    }

    showList();
    fetchTime().then(() => { setInterval(tick, 1000); tick(); });
</script>

</body>
</html>
