<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello — Space</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .main-content { max-width: 450px; margin: 0 auto; text-align: center; }
        
        /* Spotify Card yang Lebih Menarik */
        .spotify-card {
            display: flex; align-items: center; gap: 15px;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 16px 20px; border-radius: 12px; margin: 30px auto;
            text-decoration: none; color: inherit; transition: all 0.3s ease;
        }
        .spotify-card:hover { border-color: #1DB954; background: rgba(255, 255, 255, 0.06); transform: translateY(-2px); }
        .spotify-text { text-align: left; }
        .spotify-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
        .spotify-desc { font-size: 12px; opacity: 0.5; }

        /* Blog Section */
        .blog-section { margin-top: 50px; text-align: left; }
        .post-item { display: flex; align-items: flex-start; margin-bottom: 20px; }
        .lang-label { min-width: 40px; color: var(--gray); font-size: 12px; margin-top: 5px; font-family: monospace; }
        .post-title { font-size: 16px; font-weight: 500; margin: 0; color: inherit; }
        .post-meta { font-size: 12px; color: var(--gray); margin-top: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <header class="home-header">
            <nav>
                <button id="theme-toggle" title="Ubah Tema">🌙</button>
                <div class="hamburger" id="hamburger">☰</div>
                <ul class="menu" id="menu">
                    <li><a href="index.html">About</a></li>
                    <li><a href="blog.html">Blog</a></li>
                </ul>
            </nav>
        </header>

        <main class="bio main-content">
            <!-- Spotify Card yang Lebih Menarik -->
            <a href="https://open.spotify.com/playlist/76nf12e17VbgguAfeCb19w?si=20mcKfnQRqqW44mqX5-LmQ&pi=CcNlAfu3RVqSM" target="_blank" class="spotify-card">
                <i class="fa-brands fa-spotify" style="font-size: 28px; color: #1DB954;"></i>
                <div class="spotify-text">
                    <div class="spotify-title">My Playlist</div>
                    <div class="spotify-desc">Tuning into my current space</div>
                </div>
            </a>

            <!-- Social Links -->
            <div style="display: flex; justify-content: center; gap: 30px; font-size: 24px; margin-bottom: 40px;">
                <a href="mailto:ahmadzulpiqor@mail.ugm.ac.id"><i class="fa-regular fa-envelope"></i></a>
                <a href="https://www.linkedin.com/in/ahmad-zulpiqor" target="_blank"><i class="fa-brands fa-linkedin-in"></i></a>
                <a href="https://www.instagram.com/iizuull__" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            </div>

            <!-- Blog List Section -->
            <div class="blog-section">
                <div style="font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; opacity: 0.5; margin-bottom: 20px;">Latest Writing</div>
                
                <div class="post-item">
                    <div class="lang-label">ID</div>
                    <div>
                        <a href="posts/first-24h-detoks.html" style="text-decoration: none; color: inherit;">
                            <h2 class="post-title">First 24 Hours Social Media Detoks</h2>
                        </a>
                        <div class="post-meta">Feb 20, 2026 — Productivity ◦ Focus</div>
                    </div>
                </div>
            </div>

            <!-- Bagian PGP yang Diperbesar -->
            <div style="text-align: center; margin-top: 60px; font-family: monospace; font-size: 13px; opacity: 0.6; line-height: 1.8;">
                <div>// magna diis curae, parva neglegunt.</div>
                <div>pgp: <a href="#" style="color: inherit; text-decoration: underline; font-weight: 500;">0x7B2F...4A</a></div>
            </div>
        </main>
    </div>

    <script>
        const hamburger = document.getElementById('hamburger');
        const menu = document.getElementById('menu');
        const themeToggle = document.getElementById('theme-toggle');
        hamburger.addEventListener('click', (e) => { menu.classList.toggle('active'); hamburger.innerHTML = menu.classList.contains('active') ? '✕' : '☰'; });
        themeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
            themeToggle.innerHTML = isDark ? '🌙' : '☀️';
        });
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') { document.documentElement.setAttribute('data-theme', 'dark'); themeToggle.innerHTML = '☀️'; }
    </script>
</body>
</html>
