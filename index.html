<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello — Space</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Kartu Spotify Minimalis */
        .spotify-card {
            display: flex; 
            align-items: center; 
            justify-content: center;
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 20px 30px; 
            border-radius: 16px; 
            max-width: 200px; 
            margin: 40px auto; 
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
        }
        .spotify-card:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: #1DB954;
            transform: translateY(-2px);
        }

        /* Ikon Sosial */
        .social-links {
            margin-top: 20px; 
            display: flex; 
            justify-content: center; 
            gap: 35px; 
            font-size: 26px; 
        }
        .social-links a { text-decoration: none; color: inherit; opacity: 0.7; transition: 0.3s; }
        .social-links a:hover { opacity: 1; }

        /* Navigasi */
        .menu li a { position: relative; text-decoration: none; color: inherit; opacity: 0.7; transition: 0.3s; }
        .menu li a:hover { opacity: 1; }
        #theme-toggle { background: none; border: none; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <header class="home-header">
            <nav>
                <button id="theme-toggle" title="Ubah Tema">🌙</button>
                <div class="hamburger" id="hamburger">☰</div>
                <ul class="menu" id="menu">
                    <li><a href="index.html">About</a></li>
                    <li><a href="blog.html">Blog</a></li>
                </ul>
            </nav>
        </header>

        <main class="bio" style="text-align: center; margin-top: 80px;">
            
            <!-- Kotak Playlist Spotify -->
            <a href="https://open.spotify.com/playlist/76nf12e17VbgguAfeCb19w?si=20mcKfnQRqqW44mqX5-LmQ&pi=CcNlAfu3RVqSM" target="_blank" class="spotify-card">
                <i class="fa-brands fa-spotify" style="font-size: 32px; color: #1DB954;"></i>
            </a>

            <!-- Social Links -->
            <div class="social-links">
                <a href="mailto:ahmadzulpiqor@mail.ugm.ac.id" title="Email"><i class="fa-regular fa-envelope"></i></a>
                <a href="https://www.linkedin.com/in/ahmad-zulpiqor" target="_blank" title="LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>
                <a href="https://www.instagram.com/iizuull__" target="_blank" title="Instagram"><i class="fa-brands fa-instagram"></i></a>
            </div>

            <!-- Bagian teks bawah -->
            <div style="text-align: center; margin-top: 80px; font-family: monospace; font-size: 11px; opacity: 0.3; letter-spacing: 0.5px;">
                <div>// magna diis curae, parva neglegunt.</div>
                <div>pgp: <a href="#" style="color: inherit; text-decoration: underline;">0x7B2F...4A</a></div>
            </div>
        </main>

        <footer style="text-align: center; margin-top: 80px; padding-bottom: 30px; opacity: 0.7; font-size: 13px;">
            © 2026. Built with simplicity.
        </footer>
    </div>

    <script>
        const hamburger = document.getElementById('hamburger');
        const menu = document.getElementById('menu');
        const themeToggle = document.getElementById('theme-toggle');

        hamburger.addEventListener('click', (e) => {
            e.stopPropagation();
            menu.classList.toggle('active');
            hamburger.innerHTML = menu.classList.contains('active') ? '✕' : '☰';
        });

        document.addEventListener('click', (e) => {
            if (!menu.contains(e.target) && !hamburger.contains(e.target)) {
                menu.classList.remove('active');
                hamburger.innerHTML = '☰';
            }
        });

        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'light');
                themeToggle.innerHTML = '🌙';
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeToggle.innerHTML = '☀️';
                localStorage.setItem('theme', 'dark');
            }
        });

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeToggle.innerHTML = '☀️';
        }
    </script>
</body>
</html>
