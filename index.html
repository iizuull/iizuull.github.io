<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello — Space</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .main-content { max-width: 450px; margin: 0 auto; text-align: center; }
        
        /* Spotify Card Modern */
        .spotify-card {
            display: flex; align-items: center; gap: 15px;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 16px 20px; border-radius: 12px; margin: 30px auto 40px auto;
            text-decoration: none; color: inherit; transition: all 0.3s ease;
        }
        .spotify-card:hover { border-color: #1DB954; background: rgba(255, 255, 255, 0.06); transform: translateY(-2px); }
        .spotify-text { text-align: left; }
        .spotify-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
        .spotify-desc { font-size: 12px; opacity: 0.5; }

        /* Blog Section */
        .blog-section { 
            margin-top: 40px; 
            text-align: left; 
            border-top: 1px dashed rgba(255, 255, 255, 0.1); 
            padding-top: 35px;
            margin-bottom: 60px;
        }
        #latest-posts-container { min-height: 50px; }
        .loading-text { font-size: 13px; opacity: 0.5; font-family: monospace; }

        /* Pengaturan Ukuran Font Judul Blog yang Baru (Diperkecil) */
        #latest-posts-container .post-item h2 {
            font-size: 15px !important; /* Ukuran font diperkecil secara paksa */
            font-weight: 500;
            line-height: 1.4;
        }
        #latest-posts-container .post-meta {
            font-size: 12px;
            opacity: 0.8;
        }

        /* Posisi Sosial Media Di Paling Bawah */
        .social-links {
            display: flex; justify-content: center; gap: 35px; font-size: 24px; margin-top: 50px; margin-bottom: 30px;
        }
        .social-links a {
            text-decoration: none;
            color: inherit;
            opacity: 0.6;
            transition: all 0.25s ease;
        }
        .social-links a:hover {
            opacity: 1;
            transform: translateY(-2px);
        }
        
        .menu li a { position: relative; text-decoration: none; color: inherit; opacity: 0.7; transition: opacity 0.3s ease; }
        .menu li a:hover { opacity: 1; }
        #theme-toggle { background: none; border: none; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <header class="home-header">
            <nav>
                <button id="theme-toggle" title="Ubah Tema">🌙</button>
                <div class="hamburger" id="hamburger">☰</div>
                <ul class="menu" id="menu">
                    <li><a href="index.html">About</a></li>
                    <li><a href="blog.html">Blog</a></li>
                </ul>
            </nav>
        </header>

        <main class="bio main-content">
            <a href="https://open.spotify.com/playlist/76nf12e17VbgguAfeCb19w?si=20mcKfnQRqqW44mqX5-LmQ&pi=CcNlAfu3RVqSM" target="_blank" class="spotify-card">
                <i class="fa-brands fa-spotify" style="font-size: 28px; color: #1DB954;"></i>
                <div class="spotify-text">
                    <div class="spotify-title">My Playlist</div>
                    <div class="spotify-desc">Tuning into my current space</div>
                </div>
            </a>

            <div class="blog-section">
                <div style="font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.4; margin-bottom: 25px;">Latest Writing</div>
                
                <div id="latest-posts-container">
                    <div class="loading-text">Fetching latest updates...</div>
                </div>
            </div>

            <div class="social-links">
                <a href="mailto:ahmadzulpiqor@mail.ugm.ac.id" title="Email"><i class="fa-regular fa-envelope"></i></a>
                <a href="https://www.linkedin.com/in/ahmad-zulpiqor" target="_blank" title="LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>
                <a href="https://www.instagram.com/iizuull__" target="_blank" title="Instagram"><i class="fa-brands fa-instagram"></i></a>
            </div>

            <div style="text-align: center; font-family: monospace; font-size: 13px; opacity: 0.6; line-height: 1.8;">
                <div>// magna diis curae, parva neglegunt.</div>
                <div>pgp: <a href="#" style="color: inherit; text-decoration: underline; font-weight: 500;">0x7B2F...4A</a></div>
            </div>
        </main>
    </div>

    <script>
        const hamburger = document.getElementById('hamburger');
        const menu = document.getElementById('menu');
        const themeToggle = document.getElementById('theme-toggle');
        
        hamburger.addEventListener('click', (e) => { 
            menu.classList.toggle('active'); 
            hamburger.innerHTML = menu.classList.contains('active') ? '✕' : '☰'; 
        });
        
        themeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
            themeToggle.innerHTML = isDark ? '🌙' : '☀️';
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
        });
        
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') { 
            document.documentElement.setAttribute('data-theme', 'dark'); 
            themeToggle.innerHTML = '☀️'; 
        }

        // Otomatisasi fetch 2 postingan teratas dari blog.html
        document.addEventListener("DOMContentLoaded", function() {
            fetch('blog.html')
                .then(response => {
                    if (!response.ok) throw new Error('Network error');
                    return response.text();
                })
                .then(html => {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    const allPosts = doc.querySelectorAll('.post-item');
                    const container = document.getElementById('latest-posts-container');
                    
                    if (allPosts.length > 0) {
                        container.innerHTML = '';
                        const postsToShow = Math.min(allPosts.length, 2);
                        for (let i = 0; i < postsToShow; i++) {
                            container.innerHTML += allPosts[i].outerHTML;
                        }
                    } else {
                        container.innerHTML = '<div class="loading-text">No posts found.</div>';
                    }
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('latest-posts-container').innerHTML = 
                        '<div class="loading-text">Failed to load latest writing.</div>';
                });
        });
    </script>
</body>
</html>
