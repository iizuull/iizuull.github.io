<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello — Space</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- Efek Modern & Animasi --- */

        /* Link Spotify Minimalis Modern */
        .spotify-text-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: inherit;
            text-decoration: none;
            opacity: 0.6;
            transition: all 0.3s ease;
            margin-bottom: 30px;
        }
        .spotify-text-link:hover {
            opacity: 1;
            color: #1DB954;
        }

        /* Hover efek pada menu navigasi (Garis bawah halus) */
        .menu li a {
            position: relative;
            text-decoration: none;
            color: inherit;
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }
        .menu li a:hover {
            opacity: 1;
        }
        .menu li a::after {
            content: '';
            position: absolute;
            width: 100%;
            transform: scaleX(0);
            height: 1px;
            bottom: -4px;
            left: 0;
            background-color: currentColor;
            transform-origin: bottom right;
            transition: transform 0.25s ease-out;
        }
        .menu li a:hover::after {
            transform: scaleX(1);
            transform-origin: bottom left;
        }

        /* Animasi berputar tipis pada tombol ganti tema */
        #theme-toggle {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.5s ease;
        }
        #theme-toggle:active {
            transform: rotate(360deg);
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="home-header">
            <nav>
                <button id="theme-toggle" title="Ubah Tema">🌙</button>
                <div class="hamburger" id="hamburger">☰</div>
                <ul class="menu" id="menu">
                    <li><a href="index.html">About</a></li>
                    <li><a href="blog.html">Blog</a></li>
                </ul>
            </nav>
            <!-- Judul /home sudah dihapus total dari sini -->
        </header>

        <main class="bio" style="text-align: center; margin-top: 60px;">
            <!-- Status teks minimalis tepat di tengah -->
            <p style="font-size: 17px; margin-bottom: 12px; opacity: 0.9;">
                Currently tuning into my space.
            </p>

            <!-- Tautan Teks Spotify Singkat menjadi 'my plist' -->
            <a href="https://open.spotify.com/playlist/76nf12e17VbgguAfeCb19w?si=20mcKfnQRqqW44mqX5-LmQ&pi=CcNlAfu3RVqSM" target="_blank" class="spotify-text-link">
                <i class="fa-brands fa-spotify" style="font-size: 16px;"></i> my plist
            </a>

            <!-- Social Links -->
            <div class="social-links" style="margin-top: 40px; display: flex; justify-content: center; gap: 30px; font-size: 26px; width: 100%;">
                <a href="mailto:ahmadzulpiqor@mail.ugm.ac.id" title="Email" style="text-decoration: none; color: inherit; transition: opacity 0.3s;">
                    <i class="fa-regular fa-envelope"></i>
                </a>
                <a href="https://www.linkedin.com/in/ahmad-zulpiqor" target="_blank" title="LinkedIn" style="text-decoration: none; color: inherit; transition: opacity 0.3s;">
                    <i class="fa-brands fa-linkedin-in"></i>
                </a>
                <a href="https://www.instagram.com/iizuull__" target="_blank" title="Instagram" style="text-decoration: none; color: inherit; transition: opacity 0.3s;">
                   <i class="fa-brands fa-instagram"></i>
                </a>
            </div>

            <!-- Bagian teks bawah sudah dikembalikan ke versi awal mula -->
            <div style="text-align: center; margin-top: 60px; font-family: monospace; font-size: 11px; opacity: 0.3; letter-spacing: 0.5px; line-height: 1.8;">
                <div>// magna diis curae, parva neglegunt.</div>
                <div>pgp: <a href="#" style="color: inherit; text-decoration: underline;">0x7B2F...4A</a></div>
            </div>
        </main>

        <footer style="text-align: center; margin-top: 60px; padding-bottom: 30px; opacity: 0.7; font-size: 13px;">
            © 2026. Built with simplicity.
        </footer>
    </div>

    <script>
        const hamburger = document.getElementById('hamburger');
        const menu = document.getElementById('menu');
        const themeToggle = document.getElementById('theme-toggle');

        hamburger.addEventListener('click', (e) => {
            e.stopPropagation();
            menu.classList.toggle('active');
            hamburger.innerHTML = menu.classList.contains('active') ? '✕' : '☰';
        });

        document.addEventListener('click', (e) => {
            if (!menu.contains(e.target) && !hamburger.contains(e.target)) {
                menu.classList.remove('active');
                hamburger.innerHTML = '☰';
            }
        });

        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'light');
                themeToggle.innerHTML = '🌙';
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeToggle.innerHTML = '☀️';
                localStorage.setItem('theme', 'dark');
            }
        });

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeToggle.innerHTML = '☀️';
        }
    </script>
</body>
</html>
