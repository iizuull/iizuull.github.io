<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello — Space</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .main-content { max-width: 450px; margin: 0 auto; text-align: center; }
        
        /* Musik Card Modern */
        .spotify-card {
            display: flex; align-items: center; gap: 15px;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 14px 20px; border-radius: 12px; margin: 30px auto 35px auto;
            text-decoration: none; color: inherit; transition: all 0.3s ease;
        }
        .spotify-card:hover { border-color: rgba(255, 255, 255, 0.2); background: rgba(255, 255, 255, 0.06); transform: translateY(-2px); }
        
        /* Vinyl Berputar Otomatis */
        .artist-avatar {
            width: 40px; height: 40px; border-radius: 50%; object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.2); animation: spin 8s linear infinite; 
            transition: animation-duration 0.5s ease;
        }
        .spotify-card:hover .artist-avatar { animation-duration: 4s; }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .spotify-text { text-align: left; }
        .spotify-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
        .spotify-desc { font-size: 12px; opacity: 0.5; }

        .weird-hi {
            font-family: monospace; font-size: 14px; opacity: 0.4;
            letter-spacing: 2px; margin: 35px 0; user-select: none;
        }

        /* Blog Section */
        .blog-section { 
            margin-top: 20px; text-align: left; 
            border-top: 1px dashed rgba(255, 255, 255, 0.1); 
            padding-top: 35px; margin-bottom: 50px;
        }
        #latest-posts-container { min-height: 50px; }
        .loading-text { font-size: 13px; opacity: 0.5; font-family: monospace; }
        #latest-posts-container .post-item h2 { font-size: 15px !important; font-weight: 500; line-height: 1.4; }
        #latest-posts-container .post-meta { font-size: 12px; opacity: 0.8; }

        /* SOSIAL MEDIA DI BAWAH MAGNA DIIS */
        .social-links {
            display: flex; justify-content: center; gap: 35px; font-size: 24px; margin-top: 35px; margin-bottom: 20px;
        }
        .social-links a { text-decoration: none; color: inherit; opacity: 0.6; transition: all 0.25s ease; }
        .social-links a:hover { opacity: 1; transform: translateY(-2px); }
        
        .menu li a { position: relative; text-decoration: none; color: inherit; opacity: 0.7; transition: opacity 0.3s ease; }
        .menu li a:hover { opacity: 1; }
        #theme-toggle { background: none; border: none; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <header class="home-header">
            <nav>
                <button id="theme-toggle" title="Ubah Tema">🌙</button>
                <div class="hamburger" id="hamburger">☰</div>
                <ul class="menu" id="menu">
                    <li><a href="index.html">About</a></li>
                    <li><a href="blog.html">Blog</a></li>
                </ul>
            </nav>
        </header>

        <main class="bio main-content">
            <a href="https://open.spotify.com/playlist/76nf12e17VbgguAfeCb19w?si=20mcKfnQRqqW44mqX5-LmQ&pi=CcNlAfu3RVqSM" target="_blank" class="spotify-card">
                <img class="artist-avatar" src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=150" alt="Vinyl Art">
                <div class="spotify-text">
                    <div class="spotify-title">On Repeat</div>
                    <div class="spotify-desc">Tap to open playlist</div>
                </div>
            </a>

            <div class="weird-hi">hi, i'm Zul</div>

            <div class="blog-section">
                <div style="font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.4; margin-bottom: 25px;">Latest Writing</div>
                <div id="latest-posts-container">
                    <div class="loading-text">Fetching latest updates...</div>
                </div>
            </div>

            <div style="text-align: center; font-family: monospace; font-size: 13px; opacity: 0.6; line-height: 1.8;">
                <div>// magna diis curae, parva neglegunt.</div>
                <div>pgp: <a href="#" style="color: inherit; text-decoration: underline; font-weight: 500;">0x7B2F...4A</a></div>
            </div>

            <div class="social-links">
                <a href="mailto:ahmadzulpiqor@mail.ugm.ac.id" title="Email"><i class="fa-regular fa-envelope"></i></a>
                <a href="https://www.linkedin.com/in/ahmad-zulpiqor" target="_blank" title="LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>
                <a href="https://www.instagram.com/iizuull__" target="_blank" title="Instagram"><i class="fa-brands fa-instagram"></i></a>
            </div>
        </main>

        <footer style="text-align: center; padding: 20px 0; opacity: 0.6; font-size: 12px; letter-spacing: 0.5px;">
            © 2026 Ahmad Zulpiqor. Built with simplicity.
        </footer>
    </div>

    <script>
        const hamburger = document.getElementById('hamburger');
        const menu = document.getElementById('menu');
        const themeToggle = document.getElementById('theme-toggle');
        
        hamburger.addEventListener('click', (e) => { 
            menu.classList.toggle('active'); 
            hamburger.innerHTML = menu.classList.contains('active') ? '✕' : '☰'; 
        });
        
        themeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
            themeToggle.innerHTML = isDark ? '🌙' : '☀️';
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
        });
        
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') { 
            document.documentElement.setAttribute('data-theme', 'dark'); 
            themeToggle.innerHTML = '☀️'; 
        }

        document.addEventListener("DOMContentLoaded", function() {
            fetch('blog.html')
                .then(response => response.text())
                .then(html => {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    const allPosts = doc.querySelectorAll('.post-item');
                    const container = document.getElementById('latest-posts-container');
                    
                    if (allPosts.length > 0) {
                        container.innerHTML = '';
                        const postsToShow = Math.min(allPosts.length, 2);
                        for (let i = 0; i < postsToShow; i++) {
                            container.innerHTML += allPosts[i].outerHTML;
                        }
                    }
                });
        });
    </script>
</body>
</html>
